<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabiscu - Oficial</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #121212; }
        
        /* LOGIN DARK */
        #login-screen { 
            display: flex; flex-direction: column; width: 320px; 
            margin: 100px auto; gap: 12px; background: #1e1e1e; 
            padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }
        h2 { text-align: center; color: #fff; margin: 0 0 10px 0; }
        input { padding: 12px; background: #2c2c2c; color: #fff; border: 1px solid #333; border-radius: 6px; }
        button { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #btn-login { background: #3b82f6; color: white; }
        #btn-signup { background: #10b981; color: white; }
        #btn-logout { background: #ef4444; color: white; }

        /* MURAL BRANCO */
        #mural-screen { display: none; background: white; width: 100vw; height: 100vh; position: relative; }
        canvas { display: block; background-color: #ffffff; cursor: crosshair; }

        /* TOOLS */
        #ui-controls { 
            position: absolute; top: 10px; left: 10px; z-index: 10; 
            background: #1e1e1e; color: white; padding: 10px; 
            border-radius: 8px; display: flex; gap: 10px; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #333;
        }
        .tool-group { display: flex; align-items: center; gap: 5px; border-right: 1px solid #444; padding-right: 10px; }
        select, input[type="color"] { background: #2c2c2c; color: white; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
        #msg { color: #ff6b6b; font-size: 13px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Rabiscu</h2>
        <input type="email" id="email_input" placeholder="E-mail">
        <input type="password" id="password_input" placeholder="Senha">
        <button id="btn-login">Entrar</button>
        <button id="btn-signup">Criar Conta</button>
        <p id="msg"></p>
    </div>

    <div id="mural-screen">
        <div id="ui-controls">
            <div class="tool-group">
                <input type="color" id="colorPicker" value="#000000">
                <select id="sizePicker">
                    <option value="2">Fino</option>
                    <option value="5" selected>Médio</option>
                    <option value="10">Grosso</option>
                </select>
            </div>
            <div class="tool-group">
                <select id="shapePicker">
                    <option value="pencil">Lápis</option>
                    <option value="rect">Retângulo</option>
                    <option value="circle">Círculo</option>
                </select>
            </div>
            <span style="font-size: 12px;">D: Desenha | R: Move</span>
            <button id="btn-logout">Sair</button>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgUYKbUAEmOaFvh1k6UHU_v0MSenJv5tg",
            authDomain: "rabiscu-3da1e.firebaseapp.com",
            databaseURL: "https://rabiscu-3da1e-default-rtdb.firebaseio.com",
            projectId: "rabiscu-3da1e",
            storageBucket: "rabiscu-3da1e.firebasestorage.app",
            messagingSenderId: "103419841550",
            appId: "1:103419841550:web:c9dd331de0f8758936405f",
            measurementId: "G-CZY9K0HBJC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const emailInp = document.getElementById('email_input');
        const passInp = document.getElementById('password_input');
        const msg = document.getElementById('msg');
        
        let offsetX = 0, offsetY = 0;
        let isDrawing = false, isPanning = false;
        let startX, startY;
        let allStrokes = [];
        let currentStroke = null;

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            render(); 
        }
        window.addEventListener('resize', resize);
        resize();

        // AUTH
        document.getElementById('btn-signup').onclick = () => {
            createUserWithEmailAndPassword(auth, emailInp.value, passInp.value)
                .catch(e => msg.innerText = "Erro: " + e.message);
        };
        document.getElementById('btn-login').onclick = () => {
            signInWithEmailAndPassword(auth, emailInp.value, passInp.value)
                .catch(e => msg.innerText = "Usuário não encontrado ou senha incorreta.");
        };
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('mural-screen').style.display = 'block';
                loadStrokes();
                resize();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('mural-screen').style.display = 'none';
            }
        });

        // DESENHO
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 2) { 
                isPanning = true; 
                startX = e.clientX - offsetX; startY = e.clientY - offsetY; 
            } else { 
                isDrawing = true;
                currentStroke = {
                    color: document.getElementById('colorPicker').value,
                    size: document.getElementById('sizePicker').value,
                    shape: document.getElementById('shapePicker').value,
                    points: [{ x: e.clientX - offsetX, y: e.clientY - offsetY }]
                };
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isPanning) {
                offsetX = e.clientX - startX; offsetY = e.clientY - startY;
                render();
            } else if (isDrawing && currentStroke) {
                const p = { x: e.clientX - offsetX, y: e.clientY - offsetY };
                if (currentStroke.shape === 'pencil') {
                    currentStroke.points.push(p);
                } else {
                    currentStroke.points[1] = p; // Destino da forma
                }
                render();
                drawSingleStroke(currentStroke); // Feedback instantâneo
            }
        });

        window.addEventListener('mouseup', () => {
            if (isDrawing && currentStroke) {
                if (currentStroke.points.length > 1) {
                    push(ref(db, 'strokes'), currentStroke);
                }
            }
            isDrawing = false; isPanning = false; currentStroke = null;
        });

        function drawSingleStroke(s) {
            ctx.strokeStyle = s.color;
            ctx.lineWidth = s.size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            
            const p0 = { x: s.points[0].x + offsetX, y: s.points[0].y + offsetY };
            
            if (s.shape === 'pencil') {
                ctx.moveTo(p0.x, p0.y);
                s.points.forEach(p => ctx.lineTo(p.x + offsetX, p.y + offsetY));
            } else if (s.points[1]) {
                const p1 = { x: s.points[1].x + offsetX, y: s.points[1].y + offsetY };
                if (s.shape === 'rect') ctx.strokeRect(p0.x, p0.y, p1.x - p0.x, p1.y - p0.y);
                if (s.shape === 'circle') {
                    const r = Math.sqrt(Math.pow(p1.x - p0.x, 2) + Math.pow(p1.y - p0.y, 2));
                    ctx.arc(p0.x, p0.y, r, 0, Math.PI * 2);
                }
            }
            ctx.stroke();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            allStrokes.forEach(s => drawSingleStroke(s));
        }

        function loadStrokes() {
            allStrokes = [];
            onChildAdded(ref(db, 'strokes'), snap => {
                allStrokes.push(snap.val());
                render();
            });
        }
        canvas.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
