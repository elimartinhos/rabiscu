<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabiscu - Estável</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #121212; }
        #login-screen { display: flex; flex-direction: column; width: 300px; margin: 100px auto; gap: 12px; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #fff; margin: 0 0 10px 0; }
        input { padding: 12px; background: #2c2c2c; color: #fff; border: 1px solid #333; border-radius: 6px; }
        button { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #btn-login { background: #3b82f6; color: white; }
        #btn-signup { background: #10b981; color: white; }
        #btn-logout { background: #ef4444; color: white; }
        #mural-screen { display: none; background: white; width: 100vw; height: 100vh; }
        canvas { display: block; background-color: #ffffff; cursor: crosshair; }
        #ui-controls { position: absolute; top: 10px; left: 10px; z-index: 10; background: #1e1e1e; color: white; padding: 10px; border-radius: 8px; display: flex; gap: 15px; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #333; }
        input[type="color"] { width: 30px; height: 30px; border: none; background: none; cursor: pointer; }
        select { background: #2c2c2c; color: white; border: 1px solid #444; padding: 5px; border-radius: 4px; }
        #msg { color: #ff6b6b; font-size: 13px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="login-screen">
        <h2>Rabiscu</h2>
        <input type="email" id="email_input" placeholder="E-mail">
        <input type="password" id="password_input" placeholder="Senha">
        <button id="btn-login">Entrar</button>
        <button id="btn-signup">Criar Conta</button>
        <p id="msg"></p>
    </div>

    <div id="mural-screen">
        <div id="ui-controls">
            <input type="color" id="colorPicker" value="#000000">
            <select id="sizePicker"><option value="2">Fino</option><option value="5" selected>Médio</option><option value="10">Grosso</option></select>
            <span style="font-size: 12px;">Esq: Desenha | Dir: Move</span>
            <button id="btn-logout">Sair</button>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgUYKbUAEmOaFvh1k6UHU_v0MSenJv5tg",
            authDomain: "rabiscu-3da1e.firebaseapp.com",
            databaseURL: "https://rabiscu-3da1e-default-rtdb.firebaseio.com",
            projectId: "rabiscu-3da1e",
            storageBucket: "rabiscu-3da1e.firebasestorage.app",
            messagingSenderId: "103419841550",
            appId: "1:103419841550:web:c9dd331de0f8758936405f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let offsetX = 0, offsetY = 0, isDrawing = false, isPanning = false, startX, startY, allStrokes = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; render(); }
        window.addEventListener('resize', resize);
        resize();

        document.getElementById('btn-signup').onclick = () => {
            createUserWithEmailAndPassword(auth, email_input.value, password_input.value).catch(e => msg.innerText = "Erro: " + e.message);
        };
        document.getElementById('btn-login').onclick = () => {
            signInWithEmailAndPassword(auth, email_input.value, password_input.value).catch(e => msg.innerText = "Dados incorretos.");
        };
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('mural-screen').style.display = 'block';
                allStrokes = [];
                loadStrokes();
                setTimeout(resize, 100);
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('mural-screen').style.display = 'none';
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 2) { 
                isPanning = true; startX = e.clientX - offsetX; startY = e.clientY - offsetY; 
            } else { 
                isDrawing = true;
                allStrokes.push({
                    color: colorPicker.value,
                    size: sizePicker.value,
                    points: [{ x: e.clientX - offsetX, y: e.clientY - offsetY }]
                });
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isPanning) {
                offsetX = e.clientX - startX; offsetY = e.clientY - startY;
                render();
            } else if (isDrawing) {
                const p = { x: e.clientX - offsetX, y: e.clientY - offsetY };
                allStrokes[allStrokes.length - 1].points.push(p);
                render();
            }
        });

        window.addEventListener('mouseup', () => {
            if (isDrawing) {
                const last = allStrokes[allStrokes.length - 1];
                if (last && last.points.length > 1) push(ref(db, 'strokes'), last);
            }
            isDrawing = false; isPanning = false;
        });

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            allStrokes.forEach(s => {
                if (!s.points || s.points.length < 2) return; // BLINDAGEM CONTRA ERRO
                ctx.strokeStyle = s.color;
                ctx.lineWidth = s.size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(s.points[0].x + offsetX, s.points[0].y + offsetY);
                s.points.forEach(p => {
                    if(p) ctx.lineTo(p.x + offsetX, p.y + offsetY);
                });
                ctx.stroke();
            });
        }

        function loadStrokes() {
            onChildAdded(ref(db, 'strokes'), snap => {
                const val = snap.val();
                if(val && val.points) {
                    allStrokes.push(val);
                    render();
                }
            });
        }
        canvas.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
