<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rabiscu - Pro</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #f0f0f0; color: #333; touch-action: none; }
        #login-screen { 
            display: flex; flex-direction: column; width: 320px; 
            margin: 100px auto; gap: 12px; background: #fff; 
            padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        h2 { text-align: center; margin-top: 0; color: #1a1a1a; }
        input { padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 12px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #btn-login { background: #3b82f6; color: white; }
        #btn-signup { background: #10b981; color: white; }
        
        #ui-controls { 
            position: absolute; top: 10px; left: 10px; z-index: 10; 
            background: rgba(30, 30, 30, 0.9); padding: 8px; 
            border-radius: 8px; display: flex; gap: 8px; align-items: center;
            flex-wrap: wrap; max-width: 90vw; border: 1px solid #333; color: white;
        }
        canvas { display: block; background-color: #ffffff; }
        .tool-btn { background: #444; color: white; padding: 6px 10px; border-radius: 4px; font-size: 11px; border: none; }
        .tool-btn.active { background: #3b82f6; }
        
        /* Cursor da Borracha */
        .cursor-eraser { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="black" stroke-width="1"/></svg>') 16 16, auto; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Rabiscu</h2>
        <input type="email" id="email_input" placeholder="E-mail">
        <input type="password" id="password_input" placeholder="Senha">
        <button id="btn-login">Entrar</button>
        <button id="btn-signup">Criar Conta</button>
        <p id="msg" style="color:red; font-size:12px; text-align:center;"></p>
    </div>

    <div id="mural-screen" style="display: none;">
        <div id="ui-controls">
            <button id="tool-pen" class="tool-btn active">Lápis</button>
            <button id="tool-eraser" class="tool-btn">Borracha</button>
            <button id="tool-line" class="tool-btn">Linha</button>
            <button id="tool-rect" class="tool-btn">Quadrado</button>
            <button id="tool-circle" class="tool-btn">Círculo</button>
            <input type="range" id="size-slider" min="1" max="50" value="5">
            <button onclick="location.reload()" style="background:#ef4444; color:white; font-size:10px; padding:5px;">Sair</button>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgUYKbUAEmOaFvh1k6UHU_v0MSenJv5tg",
            authDomain: "rabiscu-3da1e.firebaseapp.com",
            databaseURL: "https://rabiscu-3da1e-default-rtdb.firebaseio.com",
            projectId: "rabiscu-3da1e",
            storageBucket: "rabiscu-3da1e.firebasestorage.app",
            messagingSenderId: "103419841550",
            appId: "1:103419841550:web:c9dd331de0f8758936405f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Correção para Mobile: Garante persistência da sessão
        setPersistence(auth, browserLocalPersistence);

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const sizeSlider = document.getElementById('size-slider');
        
        let offsetX = 0, offsetY = 0, isDrawing = false, isPanning = false;
        let startX, startY, allStrokes = [], currentMode = 'pen';

        // Interface de ferramentas
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.id.replace('tool-', '');
                canvas.className = currentMode === 'eraser' ? 'cursor-eraser' : '';
            };
        });

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            render(); 
        }
        window.addEventListener('resize', resize);
        resize();

        // Auth
        document.getElementById('btn-login').onclick = () => {
            signInWithEmailAndPassword(auth, email_input.value, password_input.value).catch(e => msg.innerText = e.message);
        };
        document.getElementById('btn-signup').onclick = () => {
            createUserWithEmailAndPassword(auth, email_input.value, password_input.value).catch(e => msg.innerText = e.message);
        };

        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('mural-screen').style.display = 'block';
                loadStrokes();
                setTimeout(resize, 100);
            }
        });

        // Eventos (Mouse + Touch)
        const getPos = (e) => {
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX - offsetX, y: t.clientY - offsetY };
        };

        const start = (e) => {
            if (e.button === 2) { isPanning = true; startX = e.clientX - offsetX; startY = e.clientY - offsetY; return; }
            isDrawing = true;
            const pos = getPos(e);
            startX = pos.x; startY = pos.y;
            allStrokes.push({ 
                type: currentMode === 'eraser' ? 'pen' : currentMode,
                points: [{ x: startX, y: startY }],
                color: currentMode === 'eraser' ? '#ffffff' : '#000000',
                size: sizeSlider.value
            });
        };

        const move = (e) => {
            if (isPanning) { offsetX = e.clientX - startX; offsetY = e.clientY - startY; render(); return; }
            if (!isDrawing) return;
            const pos = getPos(e);
            const cur = allStrokes[allStrokes.length - 1];
            if (cur.type === 'pen') cur.points.push(pos);
            else cur.points[1] = pos;
            render();
        };

        const end = () => {
            if (isDrawing) push(ref(db, 'strokes'), allStrokes[allStrokes.length - 1]);
            isDrawing = false; isPanning = false;
        };

        canvas.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); }, {passive: false});
        window.addEventListener('touchmove', (e) => { move(e); }, {passive: false});
        window.addEventListener('touchend', end);
        canvas.oncontextmenu = (e) => e.preventDefault();

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            allStrokes.forEach(s => {
                ctx.strokeStyle = s.color; ctx.lineWidth = s.size; ctx.lineCap = 'round'; ctx.beginPath();
                const p0 = { x: s.points[0].x + offsetX, y: s.points[0].y + offsetY };
                if (s.type === 'pen') {
                    ctx.moveTo(p0.x, p0.y);
                    s.points.forEach(p => ctx.lineTo(p.x + offsetX, p.y + offsetY));
                } else if (s.points[1]) {
                    const p1 = { x: s.points[1].x + offsetX, y: s.points[1].y + offsetY };
                    if (s.type === 'line') { ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); }
                    else if (s.type === 'rect') ctx.strokeRect(p0.x, p0.y, p1.x - p0.x, p1.y - p0.y);
                    else if (s.type === 'circle') {
                        const r = Math.sqrt(Math.pow(p1.x - p0.x, 2) + Math.pow(p1.y - p0.y, 2));
                        ctx.arc(p0.x, p0.y, r, 0, Math.PI * 2);
                    }
                }
                ctx.stroke();
            });
        }

        function loadStrokes() {
            onChildAdded(ref(db, 'strokes'), (snap) => {
                allStrokes.push(snap.val());
                render();
            });
        }
    </script>
</body>
</html>
