<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>rabiscu by elimartinhos</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #121212; color: #e0e0e0; touch-action: none; }
        #login-screen { display: flex; flex-direction: column; width: 320px; margin: 100px auto; gap: 12px; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-top: 0; color: #fff; }
        input { padding: 12px; font-size: 16px; border: 1px solid #333; border-radius: 6px; background: #2c2c2c; color: #fff; }
        button { padding: 12px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #btn-login { background: #3b82f6; color: white; }
        #btn-signup { background: #10b981; color: white; }
        #msg { color: #ff6b6b; font-size: 13px; text-align: center; min-height: 18px; }
        
        #ui-controls { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(20, 20, 20, 0.95); padding: 10px; border-radius: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; max-width: 95vw; border: 1px solid #444; color: white; cursor: default; }
        
        /* NOVO SELETOR DE CORES */
        #color-palette { display: flex; gap: 4px; flex-wrap: wrap; max-width: 140px; }
        .color-dot { width: 20px; height: 20px; border-radius: 3px; border: 1px solid #555; cursor: pointer; }
        .color-dot.active { border: 2px solid #fff; transform: scale(1.1); }

        #size-slider { width: 70px; cursor: pointer; margin: 0; }
        canvas { display: block; background-color: #ffffff; cursor: none; }
        .tool-btn { background: #333; color: white; padding: 6px 10px; border-radius: 4px; font-size: 11px; border: 1px solid #555; cursor: pointer; }
        .tool-btn.active { background: #3b82f6; border-color: #fff; }
        
        #custom-cursor { position: fixed; pointer-events: none; border: 1px solid rgba(0,0,0,0.3); border-radius: 50%; transform: translate(-50%, -50%); z-index: 99; display: none; }
        footer { position: fixed; bottom: 10px; right: 15px; font-size: 12px; color: rgba(0,0,0,0.4); z-index: 5; pointer-events: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <div id="login-screen">
        <h2>rabiscu by elimartinhos</h2>
        <input type="email" id="email_input" placeholder="E-mail">
        <input type="password" id="password_input" placeholder="Senha">
        <button id="btn-login">Entrar</button>
        <button id="btn-signup">Criar Conta</button>
        <p id="msg"></p>
    </div>
    <div id="mural-screen" style="display: none;">
        <div id="ui-controls">
            <div id="color-palette">
                <div class="color-dot active" style="background: #000000" data-color="#000000"></div>
                <div class="color-dot" style="background: #ff0000" data-color="#ff0000"></div>
                <div class="color-dot" style="background: #00ff00" data-color="#00ff00"></div>
                <div class="color-dot" style="background: #0000ff" data-color="#0000ff"></div>
                <div class="color-dot" style="background: #ffff00" data-color="#ffff00"></div>
                <div class="color-dot" style="background: #ff00ff" data-color="#ff00ff"></div>
                <div class="color-dot" style="background: #ffa500" data-color="#ffa500"></div>
                <div class="color-dot" style="background: #8b4513" data-color="#8b4513"></div>
                <div class="color-dot" style="background: #808080" data-color="#808080"></div>
                <div class="color-dot" style="background: #ffffff; border: 1px solid #ccc" data-color="#ffffff"></div>
            </div>
            <button id="tool-pen" class="tool-btn active">Lápis</button>
            <button id="tool-eraser" class="tool-btn">Borracha</button>
            <button id="tool-line" class="tool-btn">Linha</button>
            <button id="tool-rect" class="tool-btn">Quad</button>
            <button id="tool-circle" class="tool-btn">Circ</button>
            <input type="range" id="size-slider" min="1" max="50" value="5">
            <span id="zoom-label" style="font-size: 10px;">100%</span>
            <button onclick="location.reload()" style="background:#ef4444; color:white; font-size:10px; padding:5px; border:none; border-radius:4px;">Sair</button>
        </div>
        <canvas id="canvas"></canvas>
        <footer>Desenvolvido por elimartinhos</footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBgUYKbUAEmOaFvh1k6UHU_v0MSenJv5tg", authDomain: "rabiscu-3da1e.firebaseapp.com", databaseURL: "https://rabiscu-3da1e-default-rtdb.firebaseio.com", projectId: "rabiscu-3da1e", storageBucket: "rabiscu-3da1e.firebasestorage.app", messagingSenderId: "103419841550", appId: "1:103419841550:web:c9dd331de0f8758936405f" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        setPersistence(auth, browserLocalPersistence);

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('custom-cursor');
        const sizeSlider = document.getElementById('size-slider');
        const zoomLabel = document.getElementById('zoom-label');
        
        let offsetX = 0, offsetY = 0, scale = 1;
        let isDrawing = false, isPanning = false;
        let startX, startY, allStrokes = [], currentMode = 'pen', lastDist = 0, touchMidX = 0, touchMidY = 0;
        let selectedColor = "#000000";

        // Lógica do Seletor de Cores Customizado
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                selectedColor = dot.getAttribute('data-color');
                e.stopPropagation();
            });
        });

        const updateCursorUI = (e) => {
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            const isMenu = e.target && e.target.closest('#ui-controls');
            if (isMenu || (e.touches && e.touches.length > 1)) { cursor.style.display = 'none'; canvas.style.cursor = 'default'; return; }
            if (currentMode === 'pen' || currentMode === 'eraser') {
                cursor.style.display = 'block'; canvas.style.cursor = 'none';
                const size = sizeSlider.value * scale;
                cursor.style.width = size + 'px'; cursor.style.height = size + 'px';
                cursor.style.left = clientX + 'px'; cursor.style.top = clientY + 'px';
                cursor.style.background = currentMode === 'eraser' ? '#fff' : selectedColor;
            } else { cursor.style.display = 'none'; canvas.style.cursor = 'crosshair'; }
        };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; render(); }
        window.addEventListener('resize', resize);
        resize();

        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.id.replace('tool-', '');
            });
        });

        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('mural-screen').style.display = 'block';
                loadStrokes();
                setTimeout(resize, 100);
            }
        });

        const getWorldPos = (clientX, clientY) => ({ x: (clientX - offsetX) / scale, y: (clientY - offsetY) / scale });

        // TOUCH
        canvas.addEventListener('touchstart', (e) => {
            if (e.target.closest('#ui-controls')) return;
            if (e.touches.length === 2) {
                isPanning = true; isDrawing = false;
                lastDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                touchMidX = (e.touches[0].pageX + e.touches[1].pageX) / 2 - offsetX;
                touchMidY = (e.touches[0].pageY + e.touches[1].pageY) / 2 - offsetY;
            } else if (e.touches.length === 1) {
                isDrawing = true;
                const pos = getWorldPos(e.touches[0].clientX, e.touches[0].clientY);
                allStrokes.push({ type: currentMode === 'eraser' ? 'pen' : currentMode, points: [{ x: pos.x, y: pos.y }, { x: pos.x, y: pos.y }], color: currentMode === 'eraser' ? '#ffffff' : selectedColor, size: sizeSlider.value });
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (isPanning && e.touches.length === 2) {
                const midX = (e.touches[0].pageX + e.touches[1].pageX) / 2;
                const midY = (e.touches[0].pageY + e.touches[1].pageY) / 2;
                offsetX = midX - touchMidX; offsetY = midY - touchMidY;
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                scale = Math.min(Math.max(0.1, scale * (dist / lastDist)), 5);
                lastDist = dist; zoomLabel.innerText = Math.round(scale * 100) + "%";
                render();
            } else if (isDrawing && e.touches.length === 1) {
                const pos = getWorldPos(e.touches[0].clientX, e.touches[0].clientY);
                const cur = allStrokes[allStrokes.length - 1];
                if (cur.type === 'pen') cur.points.push(pos); else cur.points[1] = pos;
                render();
            }
            updateCursorUI(e);
        }, { passive: false });

        window.addEventListener('touchend', () => { if (isDrawing) push(ref(db, 'strokes'), allStrokes[allStrokes.length - 1]); isDrawing = false; isPanning = false; });

        // MOUSE
        canvas.addEventListener('mousedown', (e) => {
            if (e.target.closest('#ui-controls')) return;
            if (e.button === 2) { isPanning = true; startX = e.clientX - offsetX; startY = e.clientY - offsetY; }
            else {
                isDrawing = true;
                const pos = getWorldPos(e.clientX, e.clientY);
                allStrokes.push({ type: currentMode === 'eraser' ? 'pen' : currentMode, points: [{ x: pos.x, y: pos.y }, { x: pos.x, y: pos.y }], color: currentMode === 'eraser' ? '#ffffff' : selectedColor, size: sizeSlider.value });
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isPanning) { offsetX = e.clientX - startX; offsetY = e.clientY - startY; render(); }
            else if (isDrawing) {
                const pos = getWorldPos(e.clientX, e.clientY);
                const cur = allStrokes[allStrokes.length - 1];
                if (cur.type === 'pen') cur.points.push(pos); else cur.points[1] = pos;
                render();
            }
            updateCursorUI(e);
        });

        window.addEventListener('mouseup', () => { if (isDrawing) push(ref(db, 'strokes'), allStrokes[allStrokes.length - 1]); isDrawing = false; isPanning = false; });
        window.addEventListener('wheel', (e) => { scale = Math.min(Math.max(0.1, scale + (e.deltaY > 0 ? -0.1 : 0.1)), 5); zoomLabel.innerText = Math.round(scale * 100) + "%"; render(); }, { passive: false });
        canvas.oncontextmenu = (e) => e.preventDefault();

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(offsetX, offsetY); ctx.scale(scale, scale);
            allStrokes.forEach(s => {
                ctx.strokeStyle = s.color; ctx.lineWidth = s.size; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.beginPath();
                const p0 = s.points[0];
                if (s.type === 'pen') { ctx.moveTo(p0.x, p0.y); s.points.forEach(p => ctx.lineTo(p.x, p.y)); }
                else if (s.points[1]) {
                    const p1 = s.points[1];
                    if (s.type === 'line') { ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); }
                    else if (s.type === 'rect') ctx.strokeRect(p0.x, p0.y, p1.x - p0.x, p1.y - p0.y);
                    else if (s.type === 'circle') {
                        const dx = p1.x - p0.x, dy = p1.y - p0.y;
                        ctx.arc(p0.x + dx/2, p0.y + dy/2, Math.sqrt(dx*dx + dy*dy) / 2, 0, Math.PI * 2);
                    }
                }
                ctx.stroke();
            });
            ctx.restore();
        }

        function loadStrokes() { onChildAdded(ref(db, 'strokes'), (snap) => { allStrokes.push(snap.val()); render(); }); }
        document.getElementById('btn-login').onclick = () => signInWithEmailAndPassword(auth, email_input.value, password_input.value).catch(e => msg.innerText = "Erro no login.");
        document.getElementById('btn-signup').onclick = () => createUserWithEmailAndPassword(auth, email_input.value, password_input.value).catch(e => msg.innerText = "Erro ao criar.");
    </script>
</body>
</html>
