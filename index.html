<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabiscu - Pro</title>
    <style>
        /* MODO CLARO COM UI ESCURA */
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #f0f0f0; color: #333; }
        #login-screen { 
            display: flex; flex-direction: column; width: 320px; 
            margin: 100px auto; gap: 12px; background: #fff; 
            padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        h2 { text-align: center; margin-top: 0; color: #1a1a1a; }
        input { 
            padding: 12px; font-size: 16px; border: 1px solid #ddd; 
            border-radius: 6px; background: #fff; color: #333; 
        }
        button { padding: 12px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #btn-login { background: #3b82f6; color: white; }
        #btn-signup { background: #10b981; color: white; }
        #btn-logout { background: #ef4444; color: white; padding: 5px 10px; font-size: 12px; }
        
        #ui-controls { 
            position: absolute; top: 15px; left: 15px; z-index: 10; 
            background: rgba(30, 30, 30, 0.9); padding: 12px; 
            border-radius: 8px; display: flex; gap: 10px; align-items: center;
            border: 1px solid #333; color: white; pointer-events: auto;
        }
        canvas { display: block; background-color: #ffffff; cursor: crosshair; }
        #msg { color: #d32f2f; font-size: 13px; text-align: center; min-height: 18px; }
        .tool-btn { background: #444; color: white; padding: 5px 10px; border-radius: 4px; font-size: 11px; }
        .tool-btn.active { background: #3b82f6; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Rabiscu</h2>
        <input type="email" id="email_input" placeholder="E-mail">
        <input type="password" id="password_input" placeholder="Senha">
        <button id="btn-login">Entrar</button>
        <button id="btn-signup">Criar Conta</button>
        <p id="msg"></p>
    </div>

    <div id="mural-screen" style="display: none;">
        <div id="ui-controls">
            <button id="tool-pen" class="tool-btn active">Lápis</button>
            <button id="tool-eraser" class="tool-btn">Borracha</button>
            <button id="tool-rect" class="tool-btn">Quadrado</button>
            <button id="tool-circle" class="tool-btn">Círculo</button>
            <input type="range" id="size-slider" min="1" max="20" value="2">
            <button id="btn-logout">Sair</button>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgUYKbUAEmOaFvh1k6UHU_v0MSenJv5tg",
            authDomain: "rabiscu-3da1e.firebaseapp.com",
            databaseURL: "https://rabiscu-3da1e-default-rtdb.firebaseio.com",
            projectId: "rabiscu-3da1e",
            storageBucket: "rabiscu-3da1e.firebasestorage.app",
            messagingSenderId: "103419841550",
            appId: "1:103419841550:web:c9dd331de0f8758936405f",
            measurementId: "G-CZY9K0HBJC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const sizeSlider = document.getElementById('size-slider');
        
        let offsetX = 0, offsetY = 0;
        let isDrawing = false, isPanning = false;
        let startX, startY;
        let allStrokes = [];
        let currentMode = 'pen'; 

        // Alternar Ferramentas
        const buttons = document.querySelectorAll('.tool-btn');
        buttons.forEach(btn => {
            btn.onclick = () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.id.replace('tool-', '');
            };
        });

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            render(); 
        }
        window.addEventListener('resize', resize);
        resize();

        document.getElementById('btn-login').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email_input').value, document.getElementById('password_input').value);
        };
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('mural-screen').style.display = 'block';
                loadStrokes();
                resize();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('mural-screen').style.display = 'none';
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 2) { 
                isPanning = true; 
                startX = e.clientX - offsetX; startY = e.clientY - offsetY; 
            } else { 
                isDrawing = true;
                startX = e.clientX - offsetX;
                startY = e.clientY - offsetY;
                
                const color = currentMode === 'eraser' ? '#ffffff' : '#000000';
                const stroke = { 
                    type: currentMode === 'eraser' ? 'pen' : currentMode,
                    points: [{ x: startX, y: startY }],
                    color: color,
                    size: sizeSlider.value
                };
                allStrokes.push(stroke); 
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isPanning) {
                offsetX = e.clientX - startX; offsetY = e.clientY - startY;
                render();
            } else if (isDrawing) {
                const currentStroke = allStrokes[allStrokes.length - 1];
                const curX = e.clientX - offsetX;
                const curY = e.clientY - offsetY;

                if (currentStroke.type === 'pen') {
                    currentStroke.points.push({ x: curX, y: curY });
                } else {
                    currentStroke.points[1] = { x: curX, y: curY };
                }
                render();
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (isDrawing && e.button === 0) {
                const lastStroke = allStrokes[allStrokes.length - 1];
                if (lastStroke.points.length > 1 || lastStroke.type !== 'pen') push(ref(db, 'strokes'), lastStroke);
            }
            isDrawing = false; isPanning = false;
        });

        canvas.oncontextmenu = (e) => e.preventDefault();

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            allStrokes.forEach(s => {
                ctx.strokeStyle = s.color; 
                ctx.lineWidth = s.size; 
                ctx.lineCap = 'round';
                ctx.beginPath();

                if (s.type === 'pen') {
                    ctx.moveTo(s.points[0].x + offsetX, s.points[0].y + offsetY);
                    for(let i=1; i<s.points.length; i++) ctx.lineTo(s.points[i].x + offsetX, s.points[i].y + offsetY);
                } else if (s.points[1]) {
                    const x = s.points[0].x + offsetX;
                    const y = s.points[0].y + offsetY;
                    const w = s.points[1].x - s.points[0].x;
                    const h = s.points[1].y - s.points[0].y;
                    
                    if (s.type === 'rect') {
                        ctx.strokeRect(x, y, w, h);
                    } else if (s.type === 'circle') {
                        const r = Math.sqrt(w*w + h*h);
                        ctx.arc(x, y, r, 0, Math.PI * 2);
                    }
                }
                ctx.stroke();
            });
        }

        function loadStrokes() {
            allStrokes = [];
            onChildAdded(ref(db, 'strokes'), (snap) => {
                allStrokes.push(snap.val());
                render();
            });
        }
    </script>
</body>
</html>
