<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabiscu - Borracha Realtime</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #121212; }
        #login-screen { display: flex; flex-direction: column; width: 300px; margin: 100px auto; gap: 12px; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #fff; margin: 0 0 10px 0; }
        input { padding: 12px; background: #2c2c2c; color: #fff; border: 1px solid #333; border-radius: 6px; }
        button { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #btn-login { background: #3b82f6; color: white; }
        #btn-signup { background: #10b981; color: white; }
        #btn-logout { background: #ef4444; color: white; font-size: 11px; }

        #mural-screen { display: none; background: white; width: 100vw; height: 100vh; position: relative; }
        canvas { display: block; background-color: #ffffff; cursor: crosshair; }

        #ui-controls { 
            position: absolute; top: 10px; left: 10px; z-index: 10; 
            background: #1e1e1e; color: white; padding: 10px; 
            border-radius: 12px; display: flex; gap: 12px; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: 1px solid #444; 
        }

        .color-container { position: relative; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }
        #colorPicker { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
        .color-preview { width: 28px; height: 28px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 1px #444; background: black; z-index: 1; }

        .slider-container { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #aaa; }
        input[type="range"] { cursor: pointer; accent-color: #3b82f6; width: 60px; }

        select { background: #2c2c2c; color: white; border: 1px solid #444; padding: 6px; border-radius: 6px; outline: none; }
        .btn-tool { background: #444; color: white; border: 1px solid #666; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
        .btn-tool.active { background: #3b82f6; border-color: white; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Rabiscu</h2>
        <input type="email" id="email_input" placeholder="E-mail">
        <input type="password" id="password_input" placeholder="Senha">
        <button id="btn-login">Entrar</button>
        <button id="btn-signup">Criar Conta</button>
        <p id="msg" style="color: #ff6b6b; text-align: center; font-size: 13px;"></p>
    </div>

    <div id="mural-screen">
        <div id="ui-controls">
            <div class="color-container">
                <input type="color" id="colorPicker" value="#000000">
                <div id="colorPreview" class="color-preview"></div>
            </div>
            
            <div class="slider-container">
                <input type="range" id="sizeSlider" min="2" max="20" value="5">
            </div>

            <select id="shapePicker">
                <option value="pencil">Lápis ✏️</option>
                <option value="line">Linha 📏</option>
                <option value="rect">Quadrado 🟦</option>
                <option value="circle">Círculo ⭕</option>
                <option value="tri">Triângulo 🔺</option>
            </select>

            <button id="eraserBtn" class="btn-tool">Borracha 🧹</button>

            <button id="btn-logout">Sair</button>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgUYKbUAEmOaFvh1k6UHU_v0MSenJv5tg",
            authDomain: "rabiscu-3da1e.firebaseapp.com",
            databaseURL: "https://rabiscu-3da1e-default-rtdb.firebaseio.com",
            projectId: "rabiscu-3da1e",
            storageBucket: "rabiscu-3da1e.firebasestorage.app",
            messagingSenderId: "103419841550",
            appId: "1:103419841550:web:c9dd331de0f8758936405f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let offsetX = 0, offsetY = 0, isDrawing = false, isPanning = false, startX, startY;
        let allStrokes = {}; // Objeto para mapear ID do Firebase -> Dados do traço
        let tempStroke = null;
        let isEraser = false;
        let currentUser = null;

        const eraserBtn = document.getElementById('eraserBtn');
        eraserBtn.onclick = () => {
            isEraser = !isEraser;
            eraserBtn.classList.toggle('active', isEraser);
        };

        colorPicker.oninput = () => colorPreview.style.background = colorPicker.value;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; render(); }
        window.addEventListener('resize', resize);

        // Auth
        document.getElementById('btn-login').onclick = () => signInWithEmailAndPassword(auth, email_input.value, password_input.value);
        document.getElementById('btn-signup').onclick = () => createUserWithEmailAndPassword(auth, email_input.value, password_input.value);
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            currentUser = user;
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('mural-screen').style.display = 'block';
                allStrokes = {};
                loadStrokes();
                resize();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('mural-screen').style.display = 'none';
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 2) { 
                isPanning = true; startX = e.clientX - offsetX; startY = e.clientY - offsetY; 
            } else { 
                isDrawing = true;
                if (!isEraser) {
                    tempStroke = {
                        userId: currentUser.uid, // IDENTIFICADOR DO DONO
                        color: colorPicker.value,
                        size: sizeSlider.value,
                        shape: shapePicker.value,
                        points: [{ x: e.clientX - offsetX, y: e.clientY - offsetY }]
                    };
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const x = e.clientX - offsetX;
            const y = e.clientY - offsetY;

            if (isPanning) {
                offsetX = e.clientX - startX; offsetY = e.clientY - startY;
                render();
            } else if (isDrawing) {
                if (isEraser) {
                    checkErase(x, y);
                } else if (tempStroke) {
                    const p = { x, y };
                    if (tempStroke.shape === 'pencil') tempStroke.points.push(p);
                    else tempStroke.points[1] = p;
                    render();
                    drawSingle(tempStroke);
                }
            }
        });

        window.addEventListener('mouseup', () => {
            if (isDrawing && tempStroke && !isEraser) {
                push(ref(db, 'strokes'), tempStroke);
            }
            isDrawing = false; isPanning = false; tempStroke = null;
        });

        // LÓGICA DA BORRACHA: Verifica se o clique está perto de algum ponto de algum traço
        function checkErase(x, y) {
            for (let id in allStrokes) {
                const s = allStrokes[id];
                const hit = s.points.some(p => Math.hypot(p.x - x, p.y - y) < (s.size * 2));
                if (hit) {
                    remove(ref(db, `strokes/${id}`)); // APAGA NO FIREBASE
                    break; 
                }
            }
        }

        function drawSingle(s) {
            if (!s.points || s.points.length < 1) return;
            ctx.strokeStyle = s.color;
            ctx.lineWidth = s.size;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath();
            const p0 = { x: s.points[0].x + offsetX, y: s.points[0].y + offsetY };
            if (s.shape === 'pencil') {
                ctx.moveTo(p0.x, p0.y);
                s.points.forEach(p => ctx.lineTo(p.x + offsetX, p.y + offsetY));
            } else if (s.points[1]) {
                const p1 = { x: s.points[1].x + offsetX, y: s.points[1].y + offsetY };
                if (s.shape === 'line') { ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); }
                else if (s.shape === 'rect') { ctx.strokeRect(p0.x, p0.y, p1.x - p0.x, p1.y - p0.y); }
                else if (s.shape === 'circle') { let r = Math.sqrt(Math.pow(p1.x-p0.x,2)+Math.pow(p1.y-p0.y,2)); ctx.arc(p0.x, p0.y, r, 0, Math.PI*2); }
                else if (s.shape === 'tri') { ctx.moveTo(p0.x + (p1.x - p0.x) / 2, p0.y); ctx.lineTo(p0.x, p1.y); ctx.lineTo(p1.x, p1.y); ctx.closePath(); }
            }
            ctx.stroke();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let id in allStrokes) drawSingle(allStrokes[id]);
        }

        function loadStrokes() {
            const strokesRef = ref(db, 'strokes');
            onChildAdded(strokesRef, snap => {
                allStrokes[snap.key] = snap.val();
                render();
            });
            onChildRemoved(strokesRef, snap => {
                delete allStrokes[snap.key];
                render();
            });
        }
        canvas.oncontextmenu = e => e.preventDefault();
    </script>
</body>
</html>
